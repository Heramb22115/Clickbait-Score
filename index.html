<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickbait Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultBox {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            display: none; /* Hidden until a result is generated */
        }
        /* Dynamic styles applied by JavaScript */
        .clickbait {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ef9a9a;
        }
        .normal {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎣 Clickbait AI</h1>
        <p>Paste a news headline or YouTube title below.</p>
        
        <input type="text" id="headlineInput" placeholder="e.g., You won't believe what happened next!" />
        <br>
        <button onclick="analyzeText()">Analyze Score</button>

        <div id="resultBox"></div>
    </div>

    <script>
        async function analyzeText() {
            const inputField = document.getElementById('headlineInput');
            const resultBox = document.getElementById('resultBox');
            const text = inputField.value;

            
            if(text.length < 3) {
                alert("Please enter a longer headline.");
                return;
            }

            // Call your FastAPI backend
            try {
                const response = await fetch('/score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                
                // Show the result box
                resultBox.style.display = 'block';

                // Change color and text based on the AI's answer
                if(data.is_clickbait) {
                    resultBox.className = 'clickbait';
                    resultBox.innerHTML = `🚨 <strong>CLICKBAIT DETECTED</strong><br><br>AI Confidence: ${data.clickbait_probability_score}%`;
                } else {
                    resultBox.className = 'normal';
                    resultBox.innerHTML = `📰 <strong>AUTHENTIC NEWS</strong><br><br>Clickbait Risk: ${data.clickbait_probability_score}%`;
                }
            } catch (error) {
                alert("Error connecting to the AI server.");
            }
        }
    </script>

</body>
</html>
